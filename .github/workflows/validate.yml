name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Shell syntax
        run: |
          set -eu
          sh -n root/usr/bin/mbim-lenovo-up.sh
          sh -n root/etc/init.d/mbim-lenovo
          sh -n root/etc/uci-defaults/99-mbim-lenovo
          sh -n root/etc/hotplug.d/usb/99-mbim-lenovo
          sh -n root/etc/hotplug.d/iface/99-mbim-lenovo
          sh -n root/lib/netifd/proto/mbim_lenovo.sh

      - name: Release checksums
        run: |
          set -eu
          cd dist
          sha256sum -c SHA256SUMS.txt

      - name: Privacy smoke scan
        run: |
          set -eu
          if grep -RInE \
            'C:\\Users\\[^\\]+|192\.168\.[0-9]{1,3}\.[0-9]{1,3}|10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|240[0-9a-fA-F]:|[0-9]{15}' \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude='*.ipk' \
            --exclude='*.tar.gz' \
            .; then
            echo "Private runtime data pattern found."
            exit 1
          fi
